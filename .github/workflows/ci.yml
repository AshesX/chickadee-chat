name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # Needed only for the signaling smoke test (the server runs under Bun).
      - uses: oven-sh/setup-bun@v2

      # --ignore-scripts skips Electron's binary download + uiohook's native build,
      # which typecheck / vitest / smoke don't need. esbuild's binary still arrives
      # via its platform optional-dep (no postinstall), so vitest runs.
      - name: Install
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Smoke test (signaling protocol)
        run: |
          npm run start --workspace @chickadee/signaling &
          for i in $(seq 1 20); do (echo > /dev/tcp/127.0.0.1/8080) 2>/dev/null && break; sleep 0.5; done
          node scripts/smoke-test.mjs
